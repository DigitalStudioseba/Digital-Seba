<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Digital Seba</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div class="animated-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;">
    <div style="text-align:center;max-width:480px;">
      <div class="logo-icon" style="width:64px;height:64px;margin:0 auto 24px;">
        <img src="assets/images/logo.png" alt="Digital Seba Logo" class="site-logo">
      </div>
      <div style="font-size:80px;font-weight:900;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">404</div>
      <h1 style="margin-top:16px;">Page Not Found</h1>
      <p style="color:var(--text-secondary);margin-top:8px;">The page you're looking for doesn't exist or may have been moved.</p>
      <a href="/index.html" class="btn-primary" style="margin-top:24px;display:inline-flex;">← Back to Home</a>
    </div>

  <script src="assets/js/theme.js"></script>
