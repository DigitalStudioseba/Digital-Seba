<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Watch Bangladeshi and international news, entertainment, movie and sports channels live, free, on Digital Seba.">
  <meta name="theme-color" content="#0F172A">
  <title>Live TV - Digital Seba</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/accessibility.css">
  <link rel="stylesheet" href="tv.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="animated-bg">
  <div class="bg-orb orb-1" style="opacity:0.08;"></div>
  <div class="bg-orb orb-2" style="opacity:0.05;"></div>
  <div class="bg-grid"></div>
</div>

<nav class="navbar scrolled">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <div class="logo-icon">
        <img src="../assets/images/logo.png" alt="Digital Seba Logo" class="site-logo">
      </div>
      <span class="logo-name">Digital Seba</span>
    </a>
    <div style="flex:1;"></div>
    <a href="../index.html" class="btn-outline" style="font-size:13px;padding:8px 16px;">← Home</a>
    <button class="theme-toggle" id="themeToggle" style="margin-left:8px;" aria-label="Toggle dark/light mode">
      <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</nav>

<main class="livetv-main">
  <div class="container">

    <div class="section-header" style="margin-bottom:32px;">
      <div class="section-badge">📺 Live TV</div>
      <h1>Watch Live TV</h1>
      <p>Free news, entertainment, movie &amp; sports channels — streaming live.</p>
    </div>

    <div class="livetv-layout">
      <div class="player-section">
        <div class="embed-container">
          <video id="video-player" controls autoplay playsinline></video>
          <div class="player-info">
            <div class="channel-title" id="nowPlayingTitle">Loading...</div>
            <div class="program-info" id="nowPlayingInfo">Please select a channel</div>
          </div>
        </div>
      </div>

      <div class="channel-list">
        <div class="channel-list-header">
          <h2 class="channel-list-title">Channels</h2>
          <div class="channel-count" id="channelCount">0</div>
        </div>
        <input type="text" class="channel-search" id="channelSearch" placeholder="Search channels...">
        <div class="channel-groups" id="channelGroups"></div>
        <div class="channel-grid" id="channelGrid"></div>
      </div>
    </div>

    <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-top:32px;">
      © 2026 Digital Seba. All rights reserved. Designed &amp; developed by
      <a href="https://t.me/MonirPro" target="_blank" rel="noopener" style="color:var(--primary);">Md. Monir Hossain</a>.
    </p>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="../assets/js/theme.js"></script>
<script src="channels.js"></script>
<script>
'use strict';

// --- 1. Load Data from CHANNELS_DATA ---
const channelData = [];
if (typeof CHANNELS_DATA !== 'undefined') {
  CHANNELS_DATA.categories.forEach(category => {
    category.channels.forEach(channel => {
      if (channel.streams && channel.streams.length > 0) {
        let logo = channel.logo;
        if (logo && logo.startsWith("assets/")) {
          logo = "https://raw.githubusercontent.com/sadabx/iptv/main/" + logo;
        }
        channelData.push({
          name: channel.name,
          logo: logo || 'https://placehold.co/420x300/1a1a1a/ffffff?text=LIVE%20TV',
          group: category.name,
          url: channel.streams[0].url
        });
      }
    });
  });
} else {
  console.error("CHANNELS_DATA not found. Make sure channels.js is loaded.");
}
const channelGrid = document.getElementById('channelGrid');
const channelGroupsBar = document.getElementById('channelGroups');
const channelSearch = document.getElementById('channelSearch');
let activeGroup = 'All';
let activeQuery = '';

document.getElementById('channelCount').textContent = channelData.length + ' Channels';

// --- 3. Group filter chips ---
const groups = ['All', ...new Set(channelData.map(ch => ch.group))];
groups.forEach(group => {
  const chip = document.createElement('button');
  chip.type = 'button';
  chip.className = 'channel-group-chip' + (group === 'All' ? ' active' : '');
  chip.textContent = group;
  chip.addEventListener('click', () => {
    activeGroup = group;
    channelGroupsBar.querySelectorAll('.channel-group-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderChannels();
  });
  channelGroupsBar.appendChild(chip);
});

channelSearch.addEventListener('input', () => {
  activeQuery = channelSearch.value.trim().toLowerCase();
  renderChannels();
});

// --- 4. Render Channels to DOM ---
function renderChannels() {
  channelGrid.innerHTML = '';
  const filtered = channelData.filter(ch => {
    const matchesGroup = activeGroup === 'All' || ch.group === activeGroup;
    const matchesQuery = !activeQuery || ch.name.toLowerCase().includes(activeQuery);
    return matchesGroup && matchesQuery;
  });

  if (filtered.length === 0) {
    channelGrid.innerHTML = '<div class="channel-empty">No channels match your search.</div>';
    return;
  }

  filtered.forEach((ch) => {
    const item = document.createElement('div');
    item.className = 'channel-item';

    const fallbackImg = `https://placehold.co/420x300/1a1a1a/ffffff?text=${encodeURIComponent(ch.name)}`;

    item.innerHTML = `
      <div class="channel-thumbnail-wrapper">
        <img src="${ch.logo}" class="channel-thumbnail" alt="${ch.name}" loading="lazy" onerror="this.src='${fallbackImg}'">
      </div>
      <div class="channel-name">${ch.name}</div>
    `;

    item.addEventListener('click', function () {
      changeChannel(ch.url, ch.name, ch.group, this);
    });

    channelGrid.appendChild(item);
  });
}

renderChannels();

// --- 5. Video Player & Channel Change Logic ---
let hlsInstance = null;

function changeChannel(url, channelName, groupName, element) {
  const video = document.getElementById('video-player');

  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }

  if (window.Hls && Hls.isSupported()) {
    hlsInstance = new Hls();
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play().catch(() => {});
    });
    hlsInstance.on(Hls.Events.ERROR, function (event, data) {
      if (data.fatal) {
        document.getElementById('nowPlayingInfo').textContent = 'This channel is temporarily unavailable.';
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', function () {
      video.play().catch(() => {});
    });
  }

  document.getElementById('nowPlayingTitle').textContent = channelName;
  document.getElementById('nowPlayingInfo').textContent = 'Group: ' + groupName;

  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  if (element) {
    element.classList.add('active');
    element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// --- 6. Keyboard Shortcuts ---
document.addEventListener('keydown', function (e) {
  const items = document.querySelectorAll('.channel-item');
  if (items.length === 0) return;

  const currentActive = document.querySelector('.channel-item.active');
  let currentIndex = currentActive ? Array.from(items).indexOf(currentActive) : 0;

  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    currentIndex = (currentIndex - 1 + items.length) % items.length;
  } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    currentIndex = (currentIndex + 1) % items.length;
  } else {
    return;
  }

  items[currentIndex].click();
});

// --- 7. Initialize first channel on load ---
document.addEventListener('DOMContentLoaded', function () {
  const first = document.querySelector('.channel-item');
  if (first) first.click();
});
</script>
</body>
</html>
