<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Digital Seba</title>
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <meta name="theme-color" content="#2563EB">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../assets/css/accessibility.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="../../assets/js/firebase-config.js"></script>
</head>
<body>

<a href="#forgotForm" class="ds-skip-link">Skip to form</a>

<div class="animated-bg">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>
</div>

<a href="../../index.html" class="back-home">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
  <span>Back to Digital Seba</span>
</a>

<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="../../index.html" aria-label="Digital Seba home">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <defs>
            <linearGradient id="authLogoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2563EB"/>
              <stop offset="100%" style="stop-color:#4F46E5"/>
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="22" fill="url(#authLogoGrad2)" opacity="0.15"/>
          <path d="M12 17 L24 10 L36 17 L36 31 L24 38 L12 31 Z" fill="url(#authLogoGrad2)"/>
          <path d="M17 23 L21 27 L29 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </a>
      <h1>Reset your password</h1>
      <p>Enter your email and we'll send you a reset link</p>
    </div>

    <div id="authMessage" class="auth-message hidden" role="status" aria-live="polite"></div>

    <form id="forgotForm">
      <div class="input-group">
        <label for="forgotEmail">Email Address</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="forgotEmail" class="input-field" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>

      <button type="submit" class="btn-primary btn-full" id="forgotSubmit" style="margin-top:20px;padding:14px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        Send Reset Link
      </button>
    </form>

    <div class="auth-footer">
      <p>Remembered your password? <a href="login.html" class="auth-link">Back to Sign In</a></p>
    </div>

    <div class="auth-privacy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Your data is encrypted and private. We never share your information.</span>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<style>
.back-home {
  position: fixed;
  top: 20px;
  left: 24px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-full);
  font-size: 14px;
  font-weight: 500;
}
</style>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/theme.js"></script>
<script src="../../assets/js/language.js"></script>
<script>
  const auth = (() => {
    try {
      if (typeof firebaseConfig !== 'undefined' && !firebase.apps.length) firebase.initializeApp(firebaseConfig);
      return firebase.auth();
    } catch (e) { return null; }
  })();

  const showMessage = (text, type) => {
    const el = document.getElementById('authMessage');
    el.textContent = text;
    el.className = `auth-message ${type}`;
  };

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('forgotEmail').value.trim();
    const btn = document.getElementById('forgotSubmit');
    btn.disabled = true;
    btn.innerHTML = 'Sending...';

    try {
      if (!auth) throw { code: 'Firebase not configured' };
      await auth.sendPasswordResetEmail(email);
      showMessage('Reset link sent! Please check your inbox.', 'success');
    } catch (error) {
      const messages = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/invalid-email': 'Invalid email address.',
        'Firebase not configured': 'Firebase not configured. Please add your config.'
      };
      showMessage(messages[error.code] || error.message || 'Could not send reset link. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Send Reset Link';
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    ThemeManager.init();
    LanguageManager.init();
  });
</script>
</body>
</html>
