<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Digital Seba</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="animated-bg">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>
</div>

<!-- Back to Home -->
<a href="../../index.html" class="back-home">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
  <span>Back to Digital Seba</span>
</a>

<div class="auth-layout">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <a href="../../index.html">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <defs>
            <linearGradient id="authLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2563EB"/>
              <stop offset="100%" style="stop-color:#4F46E5"/>
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="22" fill="url(#authLogoGrad)" opacity="0.15"/>
          <path d="M12 17 L24 10 L36 17 L36 31 L24 38 L12 31 Z" fill="url(#authLogoGrad)"/>
          <path d="M17 23 L21 27 L29 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </a>
      <h1>Welcome back</h1>
      <p>Sign in to your Digital Seba account</p>
    </div>

    <!-- Error/Success Messages -->
    <div id="authMessage" class="auth-message hidden"></div>

    <!-- Google Login -->
    <button id="googleLoginBtn" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <div class="divider-with-text"><span>or sign in with email</span></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="input-group">
        <label for="loginEmail">Email Address</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="loginEmail" class="input-field" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>

      <div class="input-group" style="margin-top:16px;">
        <label for="loginPassword">Password</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="loginPassword" class="input-field" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="input-action" id="togglePassword">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="auth-options">
        <label class="checkbox-group">
          <input type="checkbox" id="rememberMe">
          <span class="checkbox-custom"></span>
          <span class="checkbox-label">Remember me</span>
        </label>
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary btn-full" id="loginSubmit" style="margin-top:20px;padding:14px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="register.html" class="auth-link">Create one free</a></p>
    </div>

    <!-- Privacy note -->
    <div class="auth-privacy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Your data is encrypted and private. We never share your information.</span>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<style>
.back-home {
  position: fixed;
  top: 20px;
  left: 24px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-full);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  backdrop-filter: blur(20px);
  transition: all var(--transition-fast);
  text-decoration: none;
}
.back-home:hover { color: var(--text-primary); background: var(--bg-card); }
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo h1 { font-size: 26px; font-weight: 800; margin: 16px 0 6px; }
.auth-logo p { font-size: 15px; color: var(--text-muted); }
.auth-message {
  padding: 14px 18px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.auth-message.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; }
.auth-message.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #10B981; }
.auth-message.hidden { display: none; }
.btn-google {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all var(--transition-normal);
  margin-bottom: 20px;
  font-family: inherit;
}
.btn-google:hover {
  background: var(--bg-tertiary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.auth-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
}
.auth-link { color: var(--primary); font-size: 14px; font-weight: 600; text-decoration: none; }
.auth-link:hover { text-decoration: underline; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
.auth-footer a { color: var(--primary); font-weight: 600; }
.auth-privacy {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding: 12px 16px;
  background: rgba(37,99,235,0.06);
  border-radius: var(--radius-lg);
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
}
</style>

<script src="../../assets/js/firebase-config.js"></script>
<script src="../../assets/js/theme.js"></script>
<script src="../../assets/js/language.js"></script>
<script>
// Toast
const Toast = {
  show: (msg, type = 'info') => {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 300); }, 4000);
  }
};

// Show message
const showMessage = (msg, type = 'error') => {
  const el = document.getElementById('authMessage');
  el.textContent = msg;
  el.className = `auth-message ${type}`;
};

// Toggle password
document.getElementById('togglePassword')?.addEventListener('click', () => {
  const input = document.getElementById('loginPassword');
  input.type = input.type === 'password' ? 'text' : 'password';
});

// Google login
document.getElementById('googleLoginBtn')?.addEventListener('click', async () => {
  try {
    if (typeof firebase === 'undefined' || !window.auth) {
      showMessage('Firebase not configured. Please add your Firebase config.', 'error');
      return;
    }
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await window.auth.signInWithPopup(provider);
    const user = result.user;

    // Save user to Firestore
    if (window.db) {
      await window.db.collection('users').doc(user.uid).set({
        uid: user.uid,
        email: user.email,
        displayName: user.displayName,
        photoURL: user.photoURL,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
        role: 'user'
      }, { merge: true });
    }

    Toast.show('✅ Login successful! Redirecting...', 'success');
    setTimeout(() => window.location.href = '../../pages/dashboard/index.html', 1200);
  } catch (e) {
    showMessage('Google sign-in failed: ' + (e.message || 'Unknown error'), 'error');
  }
});

// Email login form
document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginSubmit');

  if (!email || !password) {
    showMessage('Please fill in all fields.', 'error');
    return;
  }

  btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  btn.disabled = true;

  try {
    if (typeof firebase === 'undefined' || !window.auth) {
      throw new Error('Firebase not configured');
    }

    const credential = await window.auth.signInWithEmailAndPassword(email, password);
    const user = credential.user;

    if (!user.emailVerified) {
      showMessage('Please verify your email first. Check your inbox.', 'error');
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
      return;
    }

    // Update last login
    if (window.db) {
      await window.db.collection('users').doc(user.uid).update({
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    Toast.show('✅ Login successful! Welcome back.', 'success');
    setTimeout(() => window.location.href = '../../pages/dashboard/index.html', 1000);

  } catch (error) {
    const messages = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Please try again.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/too-many-requests': 'Too many failed attempts. Please try later.',
      'Firebase not configured': 'Firebase not configured. Please add your config.'
    };
    showMessage(messages[error.code] || error.message || 'Login failed. Please try again.', 'error');

    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  ThemeManager.init();
  LanguageManager.init();
});
</script>
</body>
</html>
