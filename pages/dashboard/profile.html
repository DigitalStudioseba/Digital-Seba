<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings - Digital Seba</title>
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../assets/css/accessibility.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body data-require-auth>

<a href="#profileMain" class="ds-skip-link">Skip to content</a>

<div class="animated-bg">
  <div class="bg-orb orb-1" style="opacity:0.05;"></div>
  <div class="bg-grid"></div>
</div>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../../index.html" class="nav-logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <defs><linearGradient id="dnLG2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2563EB"/><stop offset="100%" style="stop-color:#4F46E5"/></linearGradient></defs>
          <circle cx="18" cy="18" r="17" fill="url(#dnLG2)" opacity="0.2"/>
          <path d="M9 12 L18 7 L27 12 L27 24 L18 29 L9 24 Z" fill="url(#dnLG2)"/>
          <path d="M13 17 L17 21 L23 15" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">Digital Seba</span>
        <span class="logo-tagline">Profile</span>
      </div>
    </a>
    <div style="flex:1;"></div>
    <a href="index.html" class="btn-outline" style="font-size:13px;padding:8px 16px;">← Dashboard</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" style="margin-left:8px;">
      <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</nav>

<main id="profileMain" style="padding-top:calc(var(--nav-height) + 40px);padding-bottom:80px;position:relative;z-index:1;">
  <div class="container" style="max-width:640px;">
    <div class="section-header" style="margin-bottom:28px;">
      <div class="section-badge">👤 Account</div>
      <h1>Profile Settings</h1>
      <p>Manage your personal information</p>
    </div>

    <div class="gov-card" style="max-width:100%;">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
        <div class="user-avatar-lg" id="profileAvatar" style="width:64px;height:64px;font-size:24px;">U</div>
        <div>
          <div style="font-size:18px;font-weight:700;" id="profileName">Loading...</div>
          <div style="color:var(--text-muted);font-size:14px;" id="profileEmail"></div>
        </div>
      </div>

      <div class="input-group">
        <label for="profileDisplayName">Display Name</label>
        <input type="text" id="profileDisplayName" class="input-field" placeholder="Your name">
      </div>
      <div class="input-group" style="margin-top:16px;">
        <label for="profilePhone">Phone Number</label>
        <input type="tel" id="profilePhone" class="input-field" placeholder="+880 1XXXXXXXXX">
      </div>

      <button type="button" class="btn-primary" id="profileSaveBtn" style="margin-top:24px;">Save Changes</button>
      <p style="margin-top:12px;font-size:12px;color:var(--text-muted);">
        Full profile editing (avatar upload, password change) is being finalized — this is a working preview connected to your account data.
      </p>
    </div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/firebase-config.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/theme.js"></script>
<script src="../../assets/js/language.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    ThemeManager.init();
    LanguageManager.init();

    const cached = (() => {
      try { return JSON.parse(localStorage.getItem('ds_user')); } catch { return null; }
    })();

    if (!cached) {
      window.location.href = '../auth/login.html';
      return;
    }

    const name = cached.displayName || cached.email?.split('@')[0] || 'User';
    document.getElementById('profileName').textContent = name;
    document.getElementById('profileEmail').textContent = cached.email || '';
    document.getElementById('profileDisplayName').value = name;
    document.getElementById('profileAvatar').textContent = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

    document.getElementById('profileSaveBtn').addEventListener('click', () => {
      if (window.Toast) Toast.show('Profile changes saved locally. Full sync coming soon.', 'success');
    });
  });
</script>
</body>
</html>
